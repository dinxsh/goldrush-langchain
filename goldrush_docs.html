I suite for developers, analysts, and enterprises.\",\"href\":\"/overview\",\"hidden\":false},{\"title\":\"Powered by GoldRush\",\"description\":\"Hundreds of projects powered by the GoldRush API.\",\"href\":\"/powered-by-goldrush\",\"hidden\":false},{\"title\":\"Frequently Asked Questions\",\"description\":null,\"href\":\"/faq\",\"hidden\":false},{\"title\":\"Error Handling \u0026 Troubleshooting\",\"description\":\"Comprehensive guide to error codes, rate limits, retry strategies, and debugging tips for the GoldRush Foundational and Streaming APIs.\",\"href\":\"/error-handling\",\"hidden\":false},{\"title\":\"Changelog\",\"description\":\"Latest updates and improvements to GoldRush.\",\"href\":\"/changelog/index\"}]},{\"group\":\"Components\",\"pages\":[{\"title\":\"GoldRush SDKs \u0026 CLI\",\"description\":null,\"href\":\"/goldrush-sdks\",\"hidden\":false},{\"title\":\"GoldRush MCP Server\",\"description\":\"A server that exposes GoldRush APIs as MCP resources and tools, enabling LLMs to interact with blockchain data.\",\"href\":\"/goldrush-mcp-server\",\"hidden\":false},{\"title\":\"GoldRush Agent Skills\",\"sidebarTitle\":\"GoldRush Agent Skills\",\"description\":\"Give your AI agent the knowledge to query blockchain data across 100+ chains. Install GoldRush skills in Claude Code, Cursor, VS Code, Gemini CLI, and other compatible agents.\",\"href\":\"/goldrush-agent-skills/overview\",\"hidden\":false}]}]},{\"tab\":\"Foundational API\",\"groups\":[{\"group\":\"GoldRush Foundational API\",\"pages\":[{\"title\":\"Foundational API Overview\",\"sidebarTitle\":\"Overview\",\"description\":\"The GoldRush Foundational API is a set of foundational multichain data APIs that offers structured responses for token balances, NFT assets, transactions, decoded log events, traces with internal transactions, state changes and input data. This API is ideal for applications that render wallet balances and activities, build NFT galleries, download historical transactions for cost-basis calculations among other use-cases. The API is offered via REST endpoints allowing developers to filter for specific chains and wallet addresses.\",\"href\":\"/goldrush-foundational-api/overview\",\"hidden\":false},{\"title\":\"Foundational API Quickstart\",\"sidebarTitle\":\"Quickstart\",\"description\":\"Learn how to integrate GoldRush APIs into your application in minutes. Get started with our TypeScript SDK to access multichain blockchain data.\",\"href\":\"/goldrush-foundational-api/quickstart\",\"hidden\":false},{\"title\":\"Foundational API Authentication\",\"sidebarTitle\":\"Authentication\",\"description\":\"End-to-end guide for authenticating with the GoldRush Foundational API.\",\"href\":\"/goldrush-foundational-api/authentication\",\"hidden\":false}]},{\"group\":\"Resources\",\"pages\":[{\"title\":\"Enhanced Bitcoin Support\",\"description\":\"GoldRush provides full Bitcoin data coverage with genesis-to-date indexing, spot and historical balances for HD and non-HD addresses, and historical transactions.\",\"href\":\"/resources/enhanced-bitcoin-support\",\"hidden\":false},{\"title\":\"Enhanced Spam Lists\",\"description\":\"A public, open-source npm package that provides enhanced spam lists for ERC20 tokens and NFTs.\",\"href\":\"/resources/enhanced-spam-lists\",\"hidden\":false},{\"title\":\"GoldRush Add-On from Quicknode\",\"description\":\"Step-by-step instructions for accessing GoldRush and your API key from the Quicknode Dashboard.\",\"href\":\"/resources/access-goldrush-quicknode\",\"hidden\":false}]}]},{\"tab\":\"Streaming API\",\"groups\":[{\"group\":\"GoldRush Streaming API\",\"pages\":[{\"title\":\"Streaming API Overview\",\"sidebarTitle\":\"Overview\",\"description\":\"The GoldRush Streaming API provides real-time updates on blockchain events, including token balances, new DEX pairs, wallet activity, and OHLCV price data. This API is ideal for applications that require immediate notifications or updates on blockchain activities. The API is offered via GraphQL endpoints allowing developers to filter for specific chains, or DEXes and to start real-time subscriptions.\",\"href\":\"/goldrush-streaming-api/overview\",\"hidden\":false},{\"title\":\"Streaming API Quickstart\",\"sidebarTitle\":\"Quickstart\",\"description\":\"Learn how to connect to the GoldRush Streaming API to receive real-time blockchain events over WebSocket.\",\"href\":\"/goldrush-streaming-api/quickstart\",\"hidden\":false},{\"title\":\"Streaming API Authentication\",\"sidebarTitle\":\"Authentication\",\"description\":\"End-to-end guide for authenticating GraphQL subscriptions with the GoldRush Streaming API.\",\"href\":\"/goldrush-streaming-api/authentication\",\"hidden\":false},{\"title\":\"SDK Guide\",\"description\":\"Additional details on advanced Streaming API features offered by the GoldRush TypeScript Client SDK.\",\"href\":\"/goldrush-streaming-api/sdk\",\"hidden\":false}]},{\"group\":\"Resources\",\"pages\":[{\"title\":\"GraphQL Endpoints\",\"description\":null,\"href\":\"/goldrush-streaming-api/graphql-endpoints\",\"hidden\":false},{\"title\":\"Decoded Events\",\"description\":null,\"href\":\"/goldrush-streaming-api/decoded-events\",\"hidden\":false},{\"title\":\"GoldRush Playground\",\"description\":\"The GoldRush Playground is a tool for exploring the Streaming API.\",\"href\":\"/goldrush-playground\",\"hidden\":false}]}]},{\"tab\":\"CLI\",\"groups\":[{\"group\":\"GoldRush CLI\",\"pages\":[{\"title\":\"CLI Overview\",\"sidebarTitle\":\"Overview\",\"description\":\"GoldRush CLI is a terminal-first blockchain data tool with 17 commands, 100+ chains, real-time streaming, and native MCP support for AI agents.\",\"href\":\"/goldrush-cli/overview\",\"hidden\":false},{\"title\":\"CLI Quickstart\",\"sidebarTitle\":\"Quickstart\",\"description\":\"Get started with GoldRush CLI in three commands. Query wallets, stream DEX pairs, and set up MCP for AI agents.\",\"href\":\"/goldrush-cli/quickstart\",\"hidden\":false},{\"title\":\"CLI Command Reference\",\"sidebarTitle\":\"Commands\",\"description\":\"Full reference for all 17 GoldRush CLI commands across portfolio management, market discovery, trading intelligence, and utilities.\",\"href\":\"/goldrush-cli/commands\",\"hidden\":false}]}]},{\"tab\":\"x402\",\"groups\":[{\"group\":\"GoldRush x402\",\"pages\":[{\"title\":\"x402 Overview\",\"sidebarTitle\":\"Overview\",\"description\":\"Access GoldRush blockchain data APIs with pay-per-call micropayments. No API key, no signup, no billing - just a wallet.\",\"href\":\"/goldrush-x402/overview\",\"hidden\":false},{\"title\":\"x402 Quickstart\",\"sidebarTitle\":\"Quickstart\",\"description\":\"Start making pay-per-call requests to the GoldRush API using the x402 protocol. From discovery to your first paid request in minutes.\",\"href\":\"/goldrush-x402/quickstart\",\"hidden\":false},{\"title\":\"x402 for AI Agents\",\"sidebarTitle\":\"AI Agents\",\"description\":\"Build AI agents that autonomously discover, evaluate, and pay for blockchain data using the x402 protocol - no API keys or human intervention required.\",\"href\":\"/goldrush-x402/ai-agents\",\"hidden\":false}]}]},{\"tab\":\"API Reference\",\"groups\":[{\"group\":\"Foundational API\",\"pages\":[{\"group\":\"Cross Chain\",\"pages\":[{\"title\":\"Get activity across all chains for address\",\"openapi\":\"GET /v1/address/{walletAddress}/activity/\",\"description\":\"Commonly used to locate chains which an address is active on with a single API call.\",\"href\":\"/api-reference/foundational-api/cross-chain/get-address-activity\",\"hidden\":false},{\"title\":\"Get multichain balances\",\"openapi\":\"GET /v1/allchains/address/{walletAddress}/balances/\",\"description\":\"Fetch paginated spot \u0026 historical native and token balances for a single address on up to 10 EVM chains with one API call.\",\"href\":\"/api-reference/foundational-api/cross-chain/get-allchains-balances\",\"hidden\":false},{\"title\":\"Get multichain \u0026 multiaddress transactions\",\"openapi\":\"GET /v1/allchains/transactions/\",\"description\":\"Fetch paginated transactions for up to 10 EVM addresses and 10 EVM chains with one API call. Useful for building Activity Feeds. \",\"href\":\"/api-reference/foundational-api/cross-chain/get-allchains-transactions\",\"hidden\":false}]},{\"group\":\"Balances\",\"pages\":[{\"title\":\"Get token balances for address\",\"openapi\":\"GET /v1/{chainName}/address/{walletAddress}/balances_v2/\",\"description\":\"Commonly used to fetch the native and fungible (ERC20) tokens held by an address. Response includes spot prices and other metadata.\",\"href\":\"/api-reference/foundational-api/balances/get-token-balances-for-address\",\"hidden\":false},{\"title\":\"Get historical token balances for address\",\"openapi\":\"GET /v1/{chainName}/address/{walletAddress}/historical_balances/\",\"description\":\"Commonly used to fetch the historical native and fungible (ERC20) tokens held by an address at a given block height or date. Response includes daily prices and other metadata.\",\"href\":\"/api-reference/foundational-api/balances/get-historical-token-balances-for-address\",\"hidden\":false},{\"title\":\"Get native token balance for address\",\"openapi\":\"GET /v1/{chainName}/address/{walletAddress}/balances_native/\",\"description\":\"Lightweight endpoint to just get the native token balance for an EVM address. \",\"href\":\"/api-reference/foundational-api/balances/get-native-token-balance\",\"hidden\":false},{\"title\":\"Get ERC20 token transfers for address\",\"openapi\":\"GET /v1/{chainName}/address/{walletAddress}/transfers_v2/\",\"description\":\"Commonly used to render the transfer-in and transfer-out of a token along with historical prices from an address.\",\"href\":\"/api-reference/foundational-api/balances/get-erc20-token-transfers-for-address\",\"hidden\":false},{\"title\":\"Get historical portfolio value over time\",\"openapi\":\"GET /v1/{chainName}/address/{walletAddress}/portfolio_v2/\",\"description\":\"Commonly used to render a daily portfolio balance for an address broken down by the token. The timeframe is user-configurable, defaults to 30 days.\",\"href\":\"/api-reference/foundational-api/balances/get-historical-portfolio-value-over-time\",\"hidden\":false},{\"title\":\"Get token holders as of any block height (v2)\",\"openapi\":\"GET /v1/{chainName}/tokens/{tokenAddress}/token_holders_v2/\",\"description\":\"Used to get a paginated list of current or historical token holders for a specified ERC20 or ERC721 token. \",\"href\":\"/api-reference/foundational-api/balances/get-token-holders-as-of-any-block-height-v2\",\"hidden\":false}]},{\"group\":\"Transactions\",\"pages\":[{\"title\":\"Get a transaction\",\"openapi\":\"GET /v1/{chainName}/transaction_v2/{txHash}/\",\"description\":\"Used to fetch and render a single transaction including its decoded event logs. For foundational chains, can also retrieve internal transactions, state changes and method ID where available. \",\"href\":\"/api-reference/foundational-api/transactions/get-a-transaction\",\"hidden\":false},{\"title\":\"Get transaction summary for address\",\"openapi\":\"GET /v1/{chainName}/address/{walletAddress}/transactions_summary/\",\"description\":\"Used to fetch the earliest and latest transactions, and the transaction count for a wallet. Also enriched with gas expenditure details and total ERC20 token transfers count.\",\"href\":\"/api-reference/foundational-api/transactions/get-transaction-summary-for-address\",\"hidden\":false},{\"title\":\"Get earliest transactions for address (v3) \",\"openapi\":\"GET /v1/{chainName}/bulk/transactions/{walletAddress}/\",\"description\":\"Commonly used to fetch and render the earliest transactions involving an address. Frequently seen in wallet applications.\",\"href\":\"/api-reference/foundational-api/transactions/get-earliest-transactions-for-address-v3\",\"hidden\":false},{\"title\":\"Get recent transactions for address (v3)\",\"openapi\":\"GET /v1/{chainName}/address/{walletAddress}/transactions_v3/\",\"description\":\"Commonly used to fetch and render the most recent transactions involving an address. Frequently seen in wallet applications.\",\"href\":\"/api-reference/foundational-api/transactions/get-recent-transactions-for-address-v3\",\"hidden\":false},{\"title\":\"Get paginated transactions for address (v3)\",\"openapi\":\"GET /v1/{chainName}/address/{walletAddress}/transactions_v3/page/{page}/\",\"description\":\"Commonly used to fetch the transactions involving an address including the decoded log events in a paginated fashion.\",\"href\":\"/api-reference/foundational-api/transactions/get-paginated-transactions-for-address-v3\",\"hidden\":false},{\"title\":\"Get bulk time bucket transactions for address (v3)\",\"openapi\":\"GET /v1/{chainName}/bulk/transactions/{walletAddress}/{timeBucket}/\",\"description\":\"Commonly used to fetch all transactions including their decoded log events in a 15-minute time bucket interval.\",\"href\":\"/api-reference/foundational-api/transactions/get-time-bucket-transactions-for-address-v3\",\"hidden\":false},{\"title\":\"Get all transactions in a block by page (v3) \",\"openapi\":\"GET /v1/{chainName}/block/{blockHeight}/transactions_v3/page/{page}/\",\"description\":\"Commonly used to fetch all transactions including their decoded log events in a block and further flag interesting wallets or transactions.\",\"href\":\"/api-reference/foundational-api/transactions/get-all-transactions-in-a-block-by-page\",\"hidden\":false},{\"title\":\"Get all transactions in a block (v3)\",\"openapi\":\"GET /v1/{chainName}/block_hash/{blockHash}/transactions_v3/\",\"description\":\"Commonly used to fetch all transactions including their decoded log events in a block and further flag interesting wallets or transactions.\",\"href\":\"/api-reference/foundational-api/transactions/get-all-transactions-in-a-block\",\"hidden\":false}]},{\"group\":\"NFT\",\"pages\":[{\"title\":\"Get NFTs for
